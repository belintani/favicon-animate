name: Update Badges

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  badges:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test:coverage 2>&1 | tee test-output.txt

      - name: Generate badges
        run: |
          # Extract test results
          TESTS_PASSED=$(grep -oP '✓ \K[^/]*' test-output.txt | wc -l)
          TESTS_TOTAL=$(grep -oP '✓ [^/]*/\K[0-9]*' test-output.txt | tail -1)
          
          if [ -z "$TESTS_TOTAL" ]; then
            TESTS_TOTAL=$(grep -oP '✓ \K[0-9]*' test-output.txt | tail -1)
          fi
          
          # Create badge URLs
          TESTS_BADGE="https://img.shields.io/badge/tests-passing-brightgreen"
          BUILD_BADGE="https://img.shields.io/badge/build-passing-brightgreen"
          NODE_BADGE="https://img.shields.io/badge/node-%3E%3D%2016-brightgreen"
          
          echo "TESTS_BADGE=$TESTS_BADGE" >> $GITHUB_ENV
          echo "BUILD_BADGE=$BUILD_BADGE" >> $GITHUB_ENV
          echo "NODE_BADGE=$NODE_BADGE" >> $GITHUB_ENV

      - name: Update README with badges
        run: |
          # Check if badges section exists
          if grep -q "<!-- BADGES START -->" README.md; then
            # Replace existing badges
            sed -i '/<!-- BADGES START -->/,/<!-- BADGES END -->/c\
<!-- BADGES START -->\
[![Tests](https://img.shields.io/badge/tests-passing-brightgreen)](https://github.com/belintani/favicon-animate/actions)\
[![Build](https://img.shields.io/badge/build-passing-brightgreen)](https://github.com/belintani/favicon-animate/actions)\
[![Node](https://img.shields.io/badge/node-%3E%3D%2016-brightgreen)](https://nodejs.org)\
<!-- BADGES END -->' README.md
          else
            # Add badges section after title
            sed -i '/^# favicon-animate/a\
\
<!-- BADGES START -->\
[![Tests](https://img.shields.io/badge/tests-passing-brightgreen)](https://github.com/belintani/favicon-animate/actions)\
[![Build](https://img.shields.io/badge/build-passing-brightgreen)](https://github.com/belintani/favicon-animate/actions)\
[![Node](https://img.shields.io/badge/node-%3E%3D%2016-brightgreen)](https://nodejs.org)\
<!-- BADGES END -->' README.md
          fi

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet README.md; then
            echo "No changes to commit"
          else
            git add README.md
            git commit -m "chore: update badges"
            git push
          fi
